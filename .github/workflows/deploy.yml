name: Deploy Next.js to GitHub Pages

# Replaces the prior Vite SPA deploy.
# Schedule: 18:15 UTC = 00:00 Asia/Kathmandu, so /today-nepali-date flips at midnight.

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-next-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-next-

      - name: Install (workspace root)
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SITE_URL: https://npdates.org
        run: pnpm --filter npdates-next build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/nepali-date-next/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v4
      - id: deployment
        uses: actions/deploy-pages@v4
